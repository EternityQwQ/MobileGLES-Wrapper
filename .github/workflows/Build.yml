name: Build

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    runs-on: ubuntu-22.04
    container:
      image: mingc/android-build-box:latest
      options: --user root -e NDK_VERSION=25.2.9519653

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        # 设置环境变量
        echo "BUILD_DIR=/workspace/android-build" >> $GITHUB_ENV
        echo "ANDROID_ABI=arm64-v8a" >> $GITHUB_ENV
        echo "ANDROID_PLATFORM=android-24" >> $GITHUB_ENV
        
        # 确保使用正确的NDK版本
        export ANDROID_NDK_HOME=/opt/android-ndk

    - name: Create build directory
      run: |
        mkdir -p ${{ env.BUILD_DIR }}
        echo "Build directory created at ${{ env.BUILD_DIR }}"

    - name: Configure CMake
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        cmake /workspace \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_SYSTEM_VERSION=${{ env.ANDROID_PLATFORM }} \
          -DCMAKE_ANDROID_ARCH_ABI=${{ env.ANDROID_ABI }} \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
          -DCMAKE_ANDROID_STL_TYPE=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -G Ninja

    - name: Build project
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        cmake --build . --target mobileglues --parallel $(nproc)
        echo "Build completed!"

    - name: Verify build output
      run: |
        if [ -f "${{ env.BUILD_DIR }}/libmobileglues.so" ]; then
          echo "✅ Build successful! File size: $(ls -lh ${{ env.BUILD_DIR }}/libmobileglues.so | awk '{print $5}')"
        else
          echo "❌ Build failed - libmobileglues.so not found!"
          find ${{ env.BUILD_DIR }} -name "*.so" -exec echo "Found: {}" \;
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64-libmobileglues
        path: ${{ env.BUILD_DIR }}/libmobileglues.so
        retention-days: 7
        if-no-files-found: error
